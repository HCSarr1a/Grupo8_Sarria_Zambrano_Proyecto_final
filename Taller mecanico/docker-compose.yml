services:
  pg_dev:
    image: postgres:16-alpine
    container_name: pg_dev
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: gestion_taller
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: